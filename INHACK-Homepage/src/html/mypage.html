<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- INCLUDE: head.html -->
    <meta name="description" content="INHACK - 마이페이지">
    <title>INHACK - 마이페이지</title>
    <link rel="stylesheet" href="{{BASE_PATH}}/assets/css/style.css?v=2026060402">
    <link rel="stylesheet" href="{{BASE_PATH}}/assets/css/auth.css?v=2026060402">
    <link rel="stylesheet" href="{{BASE_PATH}}/assets/css/toast.css?v=2026060402">
    <link rel="stylesheet" href="{{BASE_PATH}}/assets/css/mypage.css?v=2026060402">
    <script type="module" src="{{BASE_PATH}}/assets/js/header.js"></script>
    <script type="module" src="{{BASE_PATH}}/assets/js/mypage.js?v=2026060402"></script>
</head>
<body>
    <header>
        <!-- INCLUDE: header.html -->
    </header>

    <main>
        <!-- INCLUDE: aside.html -->

        <section id="view" class="site-view" aria-live="polite">
            <div class="mypage-wrapper">
                <h1 style="font-size:1.6rem; font-weight:700; color:#e8e8f0; margin:0 0 4px;">마이페이지</h1>

                <!-- Profile summary -->
                <div class="profile-card" id="profile-card">
                    <div class="profile-avatar" id="profile-avatar">?</div>
                    <div class="profile-info">
                        <span class="profile-name" id="profile-name">로딩 중...</span>
                        <span class="profile-username" id="profile-username"></span>
                        <span class="profile-badge badge-member" id="profile-badge">일반 회원</span>
                    </div>
                </div>

                <!-- Account info -->
                <div class="section-card">
                    <div class="section-header">계정 정보</div>
                    <div class="section-body">
                        <div class="info-grid">
                            <span class="info-label">아이디</span>
                            <span class="info-value mono" id="info-username">—</span>
                            <span class="info-label">이름</span>
                            <span class="info-value" id="info-name">—</span>
                            <span class="info-label">역할</span>
                            <span class="info-value" id="info-role">—</span>
                        </div>
                    </div>
                </div>

                <!-- 활동 기수 정보 -->
                <div class="section-card">
                    <div class="section-header">활동 기수 정보</div>
                    <div class="section-body">
                        <div style="margin-bottom: 1.5rem;">
                            <span class="info-label" style="display: block; margin-bottom: 0.5rem;">참여 중인 활동 기수</span>
                            <div id="activity-list" style="display: flex; flex-wrap: wrap; gap: 8px;">
                                <!-- 기수 뱃지들이 여기에 렌더링됨 -->
                            </div>
                        </div>
                        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 1.5rem 0;">
                        <form class="form-stack" id="add-activity-form" autocomplete="off" style="margin-top: 1rem;">
                            <div class="form-field">
                                <label for="activity-code">추가 활동 등록 코드</label>
                                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                    <input type="text" id="activity-code" placeholder="가입 코드를 입력하세요" style="margin-bottom: 0; flex: 1;">
                                    <button type="submit" class="submit-btn" id="add-activity-btn" style="margin-top: 0; padding: 0.8rem 1.5rem; white-space: nowrap; height: 100%;">등록</button>
                                </div>
                                <span class="pw-hint">새로운 학기/기수가 시작되었을 때 전달받은 코드를 입력해 새로운 활동 기수를 추가할 수 있습니다.</span>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Change password -->
                <div class="section-card">
                    <div class="section-header">비밀번호 변경</div>
                    <div class="section-body">
                        <form class="form-stack" id="change-pw-form" autocomplete="off">
                            <div class="form-field">
                                <label for="cur-pw">현재 비밀번호</label>
                                <input type="password" id="cur-pw" placeholder="현재 비밀번호 입력" autocomplete="current-password">
                            </div>
                            <div class="form-field">
                                <label for="new-pw">새 비밀번호</label>
                                <input type="password" id="new-pw" placeholder="새 비밀번호 입력" autocomplete="new-password">
                                <div class="pw-strength-bar">
                                    <div class="pw-strength-fill" id="pw-strength-fill"></div>
                                </div>
                                <span class="pw-strength-label" id="pw-strength-label"></span>
                                <span class="pw-hint">최소 8자 · 대문자 · 소문자 · 숫자 · 특수문자 각 1개 이상</span>
                            </div>
                            <div class="form-field">
                                <label for="confirm-pw">새 비밀번호 확인</label>
                                <input type="password" id="confirm-pw" placeholder="새 비밀번호 재입력" autocomplete="new-password">
                            </div>
                            <button type="submit" class="submit-btn" id="change-pw-btn">비밀번호 변경</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
